version: '3.8'

services:
  # 1. Base de données (MariaDB)
  db:
    image: mariadb:latest
    container_name: wp-database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_password
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password_2026
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp-network

  # 2. Moteur de script (PHP-FPM)
  php:
    image: php:8.2-fpm
    container_name: wp-php
    restart: always
    depends_on:
      - db
    volumes:
      - wp_data:/var/www/html
    entrypoint: >
      sh -c "docker-php-ext-install mysqli && docker-php-entrypoint php-fpm"
    networks:
      - wp-network

  # 3. Serveur Web (Nginx)
  nginx:
    image: nginx:latest
    container_name: wp-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - php
    volumes:
      - wp_data:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wp-network

networks:
  wp-network:
    driver: bridge

volumes:
  db_data:
  wp_data:
